version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: telos
      POSTGRES_PASSWORD: telos@2026
      POSTGRES_DB: telos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dump.sql:/docker-entrypoint-initdb.d/01-dump.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telos -d telos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://telos:telos%402026@db:5432/telos_db
      # Segredo do token de sessão — DEVE vir do .env do servidor (nunca commitar).
      # Gerar um forte: `openssl rand -hex 32`. Falha o start se não definido.
      SESSION_SECRET: ${SESSION_SECRET:?defina SESSION_SECRET no .env do servidor}
      MSSQL_HOST: ${MSSQL_HOST:-}
      MSSQL_PORT: ${MSSQL_PORT:-1433}
      MSSQL_DB: ${MSSQL_DB:-}
      MSSQL_USER: ${MSSQL_USER:-}
      MSSQL_PASS: ${MSSQL_PASS:-}
      MSSQL_DRIVER: ${MSSQL_DRIVER:-}
      DOMAIN_API: ${DOMAIN_API:-}
      API_KEY: ${API_KEY:-}
      SENIOR_SOAP_URL: ${SENIOR_SOAP_URL:-https://webp33.seniorcloud.com.br:30721/g5-senior-services/rubi_Synccom_opus_fopag?wsdl}
      SENIOR_SOAP_NEXTI_URL: ${SENIOR_SOAP_NEXTI_URL:-https://webp33.seniorcloud.com.br:30721/g5-senior-services/rubi_Synccom_opus_nexti}
      SENIOR_SOAP_USER: ${SENIOR_SOAP_USER:-}
      SENIOR_SOAP_PASSWORD: ${SENIOR_SOAP_PASSWORD:-}
      SENIOR_SOAP_TOKEN: ${SENIOR_SOAP_TOKEN:-}
      SENIOR_SOAP_ENCRYPTION: ${SENIOR_SOAP_ENCRYPTION:-0}
      APP_ENV: ${APP_ENV:-production}
      SENIOR_SOAP_DELAY_BETWEEN_CCUS_MS: ${SENIOR_SOAP_DELAY_BETWEEN_CCUS_MS:-2000}
      SENIOR_SOAP_DELAY_THRESHOLD_CCUS: ${SENIOR_SOAP_DELAY_THRESHOLD_CCUS:-10}
      SENIOR_SOAP_MAX_CONCURRENCY: ${SENIOR_SOAP_MAX_CONCURRENCY:-3}
      SENIOR_CACHE_CCU_TTL: ${SENIOR_CACHE_CCU_TTL:-21600}
      SENIOR_CACHE_EMPLOYEES_TTL: ${SENIOR_CACHE_EMPLOYEES_TTL:-3600}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      MONITOR_PAGE_ENABLED: ${MONITOR_PAGE_ENABLED:-false}
      EPI_PURCHASE_EMAIL: ${EPI_PURCHASE_EMAIL:-compras@grupoopus.com}
    volumes:
      - epi_documents:/app/epi_documents
      - excel_templates:/app/app/excel_templates
      - generated_reports:/app/app/generated_reports
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  epi_documents:
  excel_templates:
  generated_reports:
