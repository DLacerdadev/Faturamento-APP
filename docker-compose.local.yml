services:
  db:
    image: postgres:16-alpine
    container_name: faturamento-app-db-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: telos
      POSTGRES_PASSWORD: telos@2026
      POSTGRES_DB: telos_db
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telos -d telos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_local:
